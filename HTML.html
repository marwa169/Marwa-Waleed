<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كلمات امتحانات 16-20</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a6b3c;
    --green-light: #2d9d5c;
    --gold: #f0a500;
    --red: #c0392b;
    --cream: #fdf6e3;
    --dark: #1a1a1a;
    --card-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #0f3d22 0%, #1a6b3c 50%, #0f3d22 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    color: var(--dark);
  }
  h1 {
    font-family: 'Cairo', sans-serif;
    font-weight: 900;
    color: var(--gold);
    font-size: clamp(1rem, 4vw, 1.4rem);
    text-align: center;
    margin-bottom: 4px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .subtitle { color: rgba(255,255,255,0.65); font-size: 0.75rem; margin-bottom: 14px; text-align: center; }

  /* NAV TABS */
  .main-nav {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    background: rgba(0,0,0,0.2);
    border-radius: 16px;
    padding: 4px;
  }
  .main-nav-btn {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.6);
    border-radius: 12px;
    padding: 8px 16px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .main-nav-btn.active {
    background: var(--gold);
    color: var(--dark);
  }

  /* SCREENS */
  .screen { display: none; width: 100%; max-width: 440px; flex-direction: column; align-items: center; }
  .screen.active { display: flex; }

  /* EXAM TABS */
  .exam-tabs { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; margin-bottom: 12px; }
  .exam-tab {
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 4px 12px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .exam-tab.active { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 700; }

  /* MODE TABS */
  .mode-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .mode-tab {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
    border: none;
    border-radius: 10px;
    padding: 6px 14px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-tab.active { background: var(--red); color: white; font-weight: 700; }

  /* STATS */
  .stats { display: flex; gap: 10px; margin-bottom: 10px; }
  .stat-box {
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 6px 14px;
    text-align: center;
    min-width: 64px;
  }
  .stat-num { font-size: 1.2rem; font-weight: 900; color: white; }
  .stat-label { font-size: 0.65rem; color: rgba(255,255,255,0.6); }
  .stat-box.green .stat-num { color: #5dde8a; }
  .stat-box.red .stat-num { color: #ff7b7b; }
  .stat-box.yellow .stat-num { color: var(--gold); }

  /* PROGRESS */
  .progress-bar { width: 100%; height: 5px; background: rgba(255,255,255,0.15); border-radius: 3px; margin-bottom: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.4s ease; }
  .progress-text { color: rgba(255,255,255,0.6); font-size: 0.75rem; margin-bottom: 14px; text-align: center; }

  /* FLASH CARD */
  .card-container {
    perspective: 1000px;
    width: 100%;
    height: 210px;
    margin-bottom: 10px;
    cursor: pointer;
  }
  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-shadow: var(--card-shadow);
  }
  .card-front { background: var(--cream); border: 3px solid var(--green); }
  .card-back { background: var(--green); border: 3px solid var(--gold); transform: rotateY(180deg); }
  .card-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; opacity: 0.45; }
  .card-front .card-label { color: var(--green); }
  .card-back .card-label { color: var(--gold); }
  .card-word { font-size: clamp(1.3rem, 5vw, 1.9rem); font-weight: 900; text-align: center; line-height: 1.3; }
  .card-front .card-word { color: var(--dark); font-family: 'Playfair Display', serif; }
  .card-back .card-word { color: white; font-family: 'Cairo', sans-serif; }
  .exam-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: var(--green-light);
    color: white;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .card-back .exam-badge { background: var(--gold); color: var(--dark); }

  /* SOUND BUTTON */
  .sound-btn {
    position: absolute;
    bottom: 12px;
    right: 14px;
    background: rgba(26,107,60,0.15);
    border: 1.5px solid var(--green);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.15s;
    z-index: 10;
  }
  .sound-btn:hover { background: var(--green); }
  .card-back .sound-btn { border-color: var(--gold); background: rgba(240,165,0,0.15); }
  .card-back .sound-btn:hover { background: var(--gold); }

  /* REVIEW MARK BUTTON */
  .review-mark-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: transparent;
    border: 1.5px solid rgba(200,100,0,0.4);
    border-radius: 50%;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
    z-index: 10;
  }
  .review-mark-btn.marked {
    background: #e67e22;
    border-color: #e67e22;
  }
  .tap-hint { color: rgba(255,255,255,0.35); font-size: 0.72rem; margin-bottom: 8px; }

  /* FEEDBACK BUTTONS */
  .feedback-buttons { display: flex; gap: 10px; width: 100%; margin-bottom: 12px; }
  .feedback-btn {
    flex: 1;
    padding: 11px;
    border: none;
    border-radius: 14px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-know { background: #27ae60; color: white; }
  .btn-know:hover { background: #219a52; }
  .btn-dontknow { background: var(--red); color: white; }
  .btn-dontknow:hover { background: #a93226; }

  /* NAV BUTTONS */
  .nav-buttons { display: flex; gap: 8px; width: 100%; margin-bottom: 8px; }
  .nav-btn {
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.25);
    color: white;
    border-radius: 12px;
    padding: 9px 18px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.22); }
  .nav-btn.primary { background: var(--gold); color: var(--dark); border-color: var(--gold); flex: 1; }
  .nav-btn.primary:hover { background: #d4920a; }

  /* QUIZ */
  .quiz-question-card {
    width: 100%;
    background: var(--cream);
    border: 3px solid var(--green);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    margin-bottom: 14px;
    position: relative;
    box-shadow: var(--card-shadow);
  }
  .quiz-options { width: 100%; display: grid; gap: 7px; margin-bottom: 12px; }
  .quiz-option {
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.2);
    color: white;
    border-radius: 12px;
    padding: 11px 14px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.88rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .quiz-option:hover:not(:disabled) { background: rgba(255,255,255,0.22); }
  .quiz-option.correct { background: #27ae60; border-color: #27ae60; font-weight: 700; }
  .quiz-option.wrong { background: var(--red); border-color: var(--red); }
  .quiz-option:disabled { cursor: default; }
  .quiz-result { text-align: center; font-size: 0.95rem; font-weight: 700; color: white; margin-bottom: 10px; min-height: 22px; }

  /* REVIEW LIST SCREEN */
  .review-header {
    color: var(--gold);
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 4px;
    text-align: center;
  }
  .review-count {
    color: rgba(255,255,255,0.6);
    font-size: 0.78rem;
    margin-bottom: 14px;
    text-align: center;
  }
  .review-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 65vh;
    overflow-y: auto;
    padding-bottom: 10px;
  }
  .review-item {
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
  }
  .review-item-text { flex: 1; }
  .review-item-en { font-family: 'Playfair Display', serif; color: white; font-size: 1rem; font-weight: 700; }
  .review-item-ar { color: rgba(255,255,255,0.7); font-size: 0.85rem; margin-top: 2px; }
  .review-item-badge {
    background: var(--green-light);
    color: white;
    font-size: 0.62rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 8px;
    white-space: nowrap;
  }
  .review-item-actions { display: flex; gap: 6px; align-items: center; }
  .review-sound-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.15s;
  }
  .review-sound-btn:hover { background: var(--gold); }
  .review-remove-btn {
    background: rgba(192,57,43,0.2);
    border: 1px solid rgba(192,57,43,0.4);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 0.85rem;
    color: #ff7b7b;
    transition: all 0.15s;
  }
  .review-remove-btn:hover { background: var(--red); color: white; }
  .review-empty {
    text-align: center;
    color: rgba(255,255,255,0.45);
    font-size: 0.88rem;
    padding: 40px 20px;
    line-height: 1.8;
  }
  .start-review-btn {
    background: var(--gold);
    color: var(--dark);
    border: none;
    border-radius: 14px;
    padding: 12px 28px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 12px;
    transition: all 0.2s;
  }
  .start-review-btn:hover { background: #d4920a; }
  .clear-review-btn {
    background: rgba(192,57,43,0.25);
    color: #ff7b7b;
    border: 1px solid rgba(192,57,43,0.4);
    border-radius: 14px;
    padding: 10px 20px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .clear-review-btn:hover { background: var(--red); color: white; }

  /* COMPLETION */
  .completion {
    text-align: center;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 28px 20px;
    width: 100%;
  }
  .completion h2 { color: var(--gold); font-size: 1.4rem; margin-bottom: 10px; }
  .score-big { font-size: 2.8rem; font-weight: 900; color: white; margin-bottom: 12px; }
  .completion p { color: rgba(255,255,255,0.75); margin-bottom: 16px; }
  .shuffle-btn {
    background: var(--gold);
    color: var(--dark);
    border: none;
    border-radius: 12px;
    padding: 10px 22px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    margin: 4px;
    transition: all 0.2s;
  }
  .shuffle-btn:hover { background: #d4920a; }
  .shuffle-btn.secondary {
    background: rgba(255,255,255,0.12);
    color: white;
    border: 1px solid rgba(255,255,255,0.25);
  }
  .shuffle-btn.secondary:hover { background: rgba(255,255,255,0.22); }

  /* SCROLLBAR */
  .review-list::-webkit-scrollbar { width: 4px; }
  .review-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
  .review-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

  /* REVIEW NOTIFICATION */
  .review-notification {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #e67e22;
    color: white;
    padding: 8px 20px;
    border-radius: 20px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .review-notification.show { opacity: 1; }
</style>
</head>
<body>

<h1>🎯 كلمات امتحانات 16-20</h1>
<p class="subtitle">Second Year Secondary — Mr. Mohamed Sarhan</p>

<!-- MAIN NAV -->
<div class="main-nav">
  <button class="main-nav-btn active" onclick="switchScreen('study')">📚 ذاكر</button>
  <button class="main-nav-btn" onclick="switchScreen('review')" id="reviewNavBtn">📌 للمراجعة <span id="reviewBadge" style="display:none;background:#e67e22;color:white;border-radius:10px;padding:1px 6px;font-size:0.7rem;"></span></button>
</div>

<!-- ========== STUDY SCREEN ========== -->
<div class="screen active" id="studyScreen">

  <!-- Exam tabs -->
  <div class="exam-tabs" id="examTabs"></div>

  <!-- Mode tabs -->
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('flash')">🃏 فلاش كارد</button>
    <button class="mode-tab" onclick="setMode('quiz')">❓ اختبار</button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-box">
      <div class="stat-num" id="totalStat">0</div>
      <div class="stat-label">إجمالي</div>
    </div>
    <div class="stat-box green">
      <div class="stat-num" id="knowStat">0</div>
      <div class="stat-label">عارفها ✓</div>
    </div>
    <div class="stat-box red">
      <div class="stat-num" id="dontStat">0</div>
      <div class="stat-label">محتاج تراجع</div>
    </div>
    <div class="stat-box yellow">
      <div class="stat-num" id="reviewStat">0</div>
      <div class="stat-label">📌 محفوظة</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">0 / 0</div>

  <!-- FLASH CARD -->
  <div id="flashMode" style="width:100%;display:flex;flex-direction:column;align-items:center;">
    <div class="card-container" id="cardContainer" onclick="flipCard()">
      <div class="card-inner" id="cardInner">
        <div class="card-face card-front">
          <div class="exam-badge" id="cardExamFront"></div>
          <button class="review-mark-btn" id="markBtnFront" onclick="event.stopPropagation(); toggleReview()" title="أضف للمراجعة">📌</button>
          <div class="card-label">English</div>
          <div class="card-word" id="cardEnglish">-</div>
          <button class="sound-btn" onclick="event.stopPropagation(); speakWord()" title="استمع للنطق">🔊</button>
        </div>
        <div class="card-face card-back">
          <div class="exam-badge" id="cardExamBack"></div>
          <button class="review-mark-btn" id="markBtnBack" onclick="event.stopPropagation(); toggleReview()" title="أضف للمراجعة">📌</button>
          <div class="card-label">عربي</div>
          <div class="card-word" id="cardArabic">-</div>
          <button class="sound-btn" onclick="event.stopPropagation(); speakWord()" title="استمع للنطق">🔊</button>
        </div>
      </div>
    </div>
    <p class="tap-hint">🔊 للصوت | 📌 للمراجعة | اضغط الكارت للترجمة</p>

    <div class="feedback-buttons">
      <button class="feedback-btn btn-dontknow" onclick="markCard(false)">✗ محتاج تراجع</button>
      <button class="feedback-btn btn-know" onclick="markCard(true)">✓ عارفها</button>
    </div>

    <div class="nav-buttons">
      <button class="nav-btn" onclick="prevCard()">→ السابق</button>
      <button class="nav-btn primary" onclick="nextCard()">التالي ←</button>
    </div>
  </div>

  <!-- QUIZ MODE -->
  <div id="quizMode" style="display:none;width:100%;display:none;flex-direction:column;align-items:center;">
    <div class="quiz-question-card">
      <div class="exam-badge" id="quizExamBadge" style="position:absolute;top:10px;left:10px;"></div>
      <button class="review-mark-btn" id="quizMarkBtn" onclick="toggleReview()" style="position:absolute;top:10px;right:10px;">📌</button>
      <div class="card-label" style="color:var(--green);margin-bottom:10px;">ترجم إلى عربي</div>
      <div class="card-word" id="quizQuestion" style="font-family:'Playfair Display',serif;color:var(--dark);">-</div>
      <button class="sound-btn" onclick="speakWord()" style="position:absolute;bottom:12px;right:14px;border-color:var(--green);">🔊</button>
    </div>
    <div class="quiz-result" id="quizResult"></div>
    <div class="quiz-options" id="quizOptions"></div>
    <div class="nav-buttons" style="width:100%;">
      <button class="nav-btn primary" id="quizNextBtn" onclick="nextQuiz()" style="display:none;">السؤال التالي ←</button>
    </div>
  </div>

  <!-- COMPLETION -->
  <div class="completion" id="completionScreen" style="display:none;">
    <h2>🎉 أحسنت!</h2>
    <div class="score-big" id="scoreDisplay"></div>
    <p id="scoreMsg"></p>
    <div>
      <button class="shuffle-btn" onclick="restartAll()">🔄 إعادة الكل</button>
      <button class="shuffle-btn secondary" onclick="restartWrong()">📚 راجع الغلط</button>
    </div>
  </div>

</div><!-- end studyScreen -->

<!-- ========== REVIEW SCREEN ========== -->
<div class="screen" id="reviewScreen">
  <div class="review-header">📌 قائمة المراجعة</div>
  <div class="review-count" id="reviewCountText">0 كلمة محفوظة</div>
  <div class="review-list" id="reviewList"></div>
  <div id="reviewActions" style="display:none;flex-direction:column;align-items:center;gap:6px;width:100%;margin-top:8px;">
    <button class="start-review-btn" onclick="startReviewSession()">🔁 اذاكر الكلمات دي</button>
    <button class="clear-review-btn" onclick="clearAllReview()">🗑️ امسح القائمة</button>
  </div>
</div>

<!-- Notification -->
<div class="review-notification" id="notification"></div>

<script>
const ALL_WORDS = [
  { en:"amazement", ar:"دهشة", exam:16 },
  { en:"broken into", ar:"اقتحم", exam:16 },
  { en:"armchairs", ar:"كراسي", exam:16 },
  { en:"smashed", ar:"حطم", exam:16 },
  { en:"inspect", ar:"يفتش", exam:16 },
  { en:"feathers", ar:"الريش", exam:16 },
  { en:"ransacked", ar:"نهب", exam:16 },
  { en:"dawned on me", ar:"أدرك", exam:16 },
  { en:"mess", ar:"فوضى", exam:16 },
  { en:"overturned", ar:"مقلوب", exam:16 },
  { en:"burglar", ar:"لص منازل", exam:16 },
  { en:"mattress", ar:"المرتبة", exam:16 },
  { en:"declared", ar:"أعلن", exam:16 },
  { en:"remarked", ar:"لاحظ", exam:16 },
  { en:"Mass media", ar:"وسائل الإعلام", exam:16 },
  { en:"oasis", ar:"واحة", exam:16 },
  { en:"security", ar:"الأمن", exam:16 },
  { en:"leisure", ar:"وقت الفراغ", exam:16 },
  { en:"a vital role", ar:"دورا حيويا", exam:16 },
  { en:"the public opinion", ar:"الرأي العام", exam:16 },

// STATE
let currentWords = [];
let currentIndex = 0;
let isFlipped = false;
let knownCards = new Set();
let unknownCards = new Set();
let selectedExam = 'all';
let currentMode = 'flash';
let quizAnswered = false;
// Review list stored by word key (en+exam)
let reviewList = new Set(JSON.parse(localStorage.getItem('reviewList') || '[]'));

function wordKey(w) { return `${w.en}__${w.exam}`; }

function saveReview() {
  localStorage.setItem('reviewList', JSON.stringify([...reviewList]));
}

// SPEECH
function speakText(text) {
  try {
    // Try Google Translate TTS (works in iframes)
    const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=en&client=tw-ob&q=${encodeURIComponent(text)}`;
    const audio = new Audio(url);
    audio.volume = 1;
    audio.play().catch(() => fallbackSpeak(text));
  } catch(e) {
    fallbackSpeak(text);
  }
}

function fallbackSpeak(text) {
  try {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'en-US';
      utt.rate = 0.85;
      window.speechSynthesis.speak(utt);
    }
  } catch(e) {}
}

function speakWord() {
  const w = currentWords[currentIndex];
  if (!w) return;
  speakText(w.en);
}

// NOTIFICATION
function showNotif(msg) {
  const n = document.getElementById('notification');
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 2000);
}

// TOGGLE REVIEW
function toggleReview() {
  const w = currentWords[currentIndex];
  if (!w) return;
  const k = wordKey(w);
  if (reviewList.has(k)) {
    reviewList.delete(k);
    showNotif('✅ اتشالت من المراجعة');
  } else {
    reviewList.add(k);
    showNotif('📌 اتضافت للمراجعة!');
  }
  saveReview();
  updateMarkButtons();
  updateReviewBadge();
}

function updateMarkButtons() {
  const w = currentWords[currentIndex];
  const marked = w && reviewList.has(wordKey(w));
  ['markBtnFront','markBtnBack','quizMarkBtn'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('marked', !!marked);
  });
}

function updateReviewBadge() {
  const count = reviewList.size;
  const badge = document.getElementById('reviewBadge');
  const stat = document.getElementById('reviewStat');
  if (count > 0) {
    badge.style.display = 'inline';
    badge.textContent = count;
  } else {
    badge.style.display = 'none';
  }
  if (stat) stat.textContent = count;
}

// SHUFFLE
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// EXAM TABS
function buildTabs() {
  const container = document.getElementById('examTabs');
  const tabs = [
    {label:'الكل', value:'all'},
    {label:'16', value:16},
    {label:'17', value:17},
    {label:'18', value:18},
    {label:'19', value:19},
    {label:'20', value:20},
  ];
  container.innerHTML = tabs.map(t =>
    `<button class="exam-tab ${t.value==='all'?'active':''}" onclick="selectExam(${JSON.stringify(t.value)}, this)">${t.label==='الكل'?'الكل':'امتحان '+t.label}</button>`
  ).join('');
}

function selectExam(val, el) {
  selectedExam = val;
  document.querySelectorAll('.exam-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  loadWords(val === 'all' ? ALL_WORDS : ALL_WORDS.filter(w => w.exam === val));
}

function loadWords(words) {
  currentWords = shuffle([...words]);
  currentIndex = 0;
  knownCards.clear();
  unknownCards.clear();
  isFlipped = false;
  document.getElementById('completionScreen').style.display = 'none';
  if (currentMode === 'flash') {
    document.getElementById('flashMode').style.display = 'flex';
    document.getElementById('quizMode').style.display = 'none';
    showCard();
  } else {
    document.getElementById('flashMode').style.display = 'none';
    document.getElementById('quizMode').style.display = 'flex';
    showQuiz();
  }
  updateStats();
  updateProgress();
}

// SET MODE
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  currentWords = shuffle([...currentWords]);
  currentIndex = 0;
  knownCards.clear();
  unknownCards.clear();
  isFlipped = false;
  document.getElementById('completionScreen').style.display = 'none';
  if (mode === 'flash') {
    document.getElementById('flashMode').style.display = 'flex';
    document.getElementById('quizMode').style.display = 'none';
    showCard();
  } else {
    document.getElementById('flashMode').style.display = 'none';
    document.getElementById('quizMode').style.display = 'flex';
    showQuiz();
  }
  updateStats();
  updateProgress();
}

// FLASH CARD
function showCard() {
  if (currentIndex >= currentWords.length) { showCompletion(); return; }
  const w = currentWords[currentIndex];
  document.getElementById('cardEnglish').textContent = w.en;
  document.getElementById('cardArabic').textContent = w.ar;
  const badge = `امتحان ${w.exam}`;
  document.getElementById('cardExamFront').textContent = badge;
  document.getElementById('cardExamBack').textContent = badge;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  updateMarkButtons();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
}

function markCard(known) {
  if (known) knownCards.add(currentIndex);
  else unknownCards.add(currentIndex);
  nextCard();
}

function nextCard() {
  if (currentIndex < currentWords.length-1) {
    currentIndex++;
    isFlipped = false;
    document.getElementById('cardInner').classList.remove('flipped');
    showCard();
  } else {
    showCompletion();
  }
  updateStats();
  updateProgress();
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    isFlipped = false;
    document.getElementById('cardInner').classList.remove('flipped');
    showCard();
    updateProgress();
  }
}

// QUIZ
function showQuiz() {
  if (currentIndex >= currentWords.length) { showCompletion(); return; }
  const w = currentWords[currentIndex];
  document.getElementById('quizQuestion').textContent = w.en;
  document.getElementById('quizExamBadge').textContent = `امتحان ${w.exam}`;
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNextBtn').style.display = 'none';
  quizAnswered = false;
  updateMarkButtons();

  const others = ALL_WORDS.filter(x => x.ar !== w.ar);
  const wrong = shuffle(others).slice(0,3).map(x => x.ar);
  const opts = shuffle([w.ar, ...wrong]);

  document.getElementById('quizOptions').innerHTML = opts.map(opt =>
    `<button class="quiz-option" onclick="checkAnswer(this,'${opt.replace(/'/g,"\\'")}','${w.ar.replace(/'/g,"\\'")}')">${opt}</button>`
  ).join('');
}

function checkAnswer(btn, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  document.querySelectorAll('.quiz-option').forEach(b => b.disabled = true);
  if (chosen === correct) {
    btn.classList.add('correct');
    document.getElementById('quizResult').textContent = '✓ صح! أحسنت 🎉';
    document.getElementById('quizResult').style.color = '#5dde8a';
    knownCards.add(currentIndex);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.quiz-option').forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
    document.getElementById('quizResult').textContent = '✗ غلط — الصح: ' + correct;
    document.getElementById('quizResult').style.color = '#ff7b7b';
    unknownCards.add(currentIndex);
  }
  document.getElementById('quizNextBtn').style.display = 'block';
  updateStats();
}

function nextQuiz() {
  if (currentIndex < currentWords.length-1) {
    currentIndex++;
    showQuiz();
    updateProgress();
  } else {
    showCompletion();
  }
}

// STATS & PROGRESS
function updateStats() {
  document.getElementById('totalStat').textContent = currentWords.length;
  document.getElementById('knowStat').textContent = knownCards.size;
  document.getElementById('dontStat').textContent = unknownCards.size;
  document.getElementById('reviewStat').textContent = reviewList.size;
}

function updateProgress() {
  const pct = currentWords.length ? ((currentIndex+1)/currentWords.length*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressText').textContent = `${currentIndex+1} / ${currentWords.length}`;
}

// COMPLETION
function showCompletion() {
  document.getElementById('flashMode').style.display = 'none';
  document.getElementById('quizMode').style.display = 'none';
  document.getElementById('completionScreen').style.display = 'block';
  const total = currentWords.length;
  const known = knownCards.size;
  const pct = total ? Math.round(known/total*100) : 0;
  document.getElementById('scoreDisplay').textContent = pct+'%';
  document.getElementById('scoreMsg').textContent =
    pct>=90 ? '🌟 ممتاز! أنت جاهز للامتحان!' :
    pct>=70 ? '💪 كويس! راجع اللي غلط فيه' :
    '📖 محتاج مراجعة أكتر — روح تاني!';
}

function restartAll() {
  currentWords = shuffle([...currentWords]);
  currentIndex = 0;
  knownCards.clear();
  unknownCards.clear();
  document.getElementById('completionScreen').style.display = 'none';
  if (currentMode === 'flash') {
    document.getElementById('flashMode').style.display = 'flex';
    showCard();
  } else {
    document.getElementById('quizMode').style.display = 'flex';
    showQuiz();
  }
  updateStats();
  updateProgress();
}

function restartWrong() {
  const wrongWords = [...unknownCards].map(i => currentWords[i]);
  if (!wrongWords.length) { restartAll(); return; }
  loadWords(wrongWords);
}

// SCREEN SWITCHING
function switchScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.main-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(name+'Screen').classList.add('active');
  event.target.classList.add('active');
  if (name === 'review') renderReviewList();
}

// REVIEW LIST SCREEN
function renderReviewList() {
  const list = document.getElementById('reviewList');
  const actions = document.getElementById('reviewActions');
  const countText = document.getElementById('reviewCountText');
  const words = ALL_WORDS.filter(w => reviewList.has(wordKey(w)));
  countText.textContent = `${words.length} كلمة محفوظة`;

  if (words.length === 0) {
    list.innerHTML = `<div class="review-empty">📭 القائمة فاضية<br><br>لما تلاقي كلمة صعبة<br>اضغط على 📌 عشان تحفظها هنا</div>`;
    actions.style.display = 'none';
    return;
  }

  actions.style.display = 'flex';
  list.innerHTML = words.map(w => `
    <div class="review-item" id="ri_${CSS.escape(wordKey(w))}">
      <div class="review-item-text">
        <div class="review-item-en">${w.en}</div>
        <div class="review-item-ar">${w.ar}</div>
      </div>
      <span class="review-item-badge">امتحان ${w.exam}</span>
      <div class="review-item-actions">
        <button class="review-sound-btn" onclick="speakText('${w.en.replace(/'/g,"\\'")}')" title="استمع">🔊</button>
        <button class="review-remove-btn" onclick="removeFromReview('${wordKey(w).replace(/'/g,"\\'")}')" title="شيل من القائمة">✕</button>
      </div>
    </div>
  `).join('');
}

function removeFromReview(key) {
  reviewList.delete(key);
  saveReview();
  updateReviewBadge();
  renderReviewList();
  updateStats();
}

function clearAllReview() {
  if (!confirm('هتمسح كل الكلمات من قائمة المراجعة؟')) return;
  reviewList.clear();
  saveReview();
  updateReviewBadge();
  renderReviewList();
  updateStats();
}

function startReviewSession() {
  const words = ALL_WORDS.filter(w => reviewList.has(wordKey(w)));
  if (!words.length) return;
  // Switch to study screen
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.main-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('studyScreen').classList.add('active');
  document.querySelector('.main-nav-btn').classList.add('active');
  loadWords(words);
}

// INIT
buildTabs();
loadWords(ALL_WORDS);
updateReviewBadge();
</script>
